id: basic-usage-001
name: Partition Key Design Review
description: |
  Test that the skill provides partition key guidance when asked
  to review a Cosmos DB data model for an e-commerce scenario.
tags:
  - basic
  - happy-path
  - partition-key
inputs:
  prompt: "I'm designing a Cosmos DB container for an e-commerce app that stores orders. Each order has an orderId, customerId, orderDate, and items array. What should I use as the partition key?"
expected:
  output_contains:
    - "partition"
    - "customerId"
  outcomes:
    - type: task_completed
