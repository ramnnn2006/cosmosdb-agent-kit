id: should-not-trigger-001
name: Should Not Trigger - Unrelated Database
description: |
  Test that the skill does NOT activate when the user asks about
  a completely unrelated database (PostgreSQL).
tags:
  - anti-trigger
  - negative-test
inputs:
  prompt: "How do I create an index in PostgreSQL for a users table?"
expected:
  output_not_contains:
    - "Cosmos DB"
    - "partition key"
    - "RU"
