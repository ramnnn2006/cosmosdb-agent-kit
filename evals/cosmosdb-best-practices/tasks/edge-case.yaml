id: edge-case-001
name: Edge Case - Cross Partition Query Warning
description: |
  Test that the skill warns about cross-partition queries when a user
  writes a query that doesn't include the partition key filter.
tags:
  - edge-case
  - query-optimization
inputs:
  prompt: "Review this Cosmos DB query for performance: SELECT * FROM c WHERE c.status = 'active' ORDER BY c.createdAt DESC. The container is partitioned by /tenantId."
expected:
  output_contains:
    - "cross-partition"
  outcomes:
    - type: task_completed
