id: query-optimization-003
name: Query Optimization - Point Read vs Query
description: |
  Test that the skill recommends point reads over queries when
  the user has both id and partition key available.
tags:
  - query
  - happy-path
  - point-read
inputs:
  prompt: |
    I'm using this query to fetch a single document:
    SELECT * FROM c WHERE c.id = @id AND c.tenantId = @tenantId

    The container is partitioned by /tenantId. Is there a better approach?
expected:
  output_contains:
    - "point read"
  outcomes:
    - type: task_completed
