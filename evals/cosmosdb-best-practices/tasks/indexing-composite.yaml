id: indexing-composite-005
name: Indexing - Composite Index Recommendation
description: |
  Test that the skill recommends composite indexes for multi-field
  ORDER BY queries.
tags:
  - indexing
  - happy-path
inputs:
  prompt: |
    My Cosmos DB query is slow:
    SELECT * FROM c WHERE c.status = 'active' ORDER BY c.createdAt DESC, c.priority ASC

    I have the default indexing policy. What should I change?
expected:
  output_contains:
    - "composite"
    - "index"
  outcomes:
    - type: task_completed
