id: throughput-autoscale-006
name: Throughput - Autoscale Recommendation
description: |
  Test that the skill recommends autoscale for unpredictable workloads
  rather than fixed manual throughput.
tags:
  - throughput
  - happy-path
inputs:
  prompt: |
    My Cosmos DB container has 10,000 RU/s provisioned manually.
    During the day we use about 2,000 RU/s but at night during batch
    processing we spike to 9,000 RU/s. We're getting throttled during
    spikes. What should we do?
expected:
  output_contains:
    - "autoscale"
  outcomes:
    - type: task_completed
