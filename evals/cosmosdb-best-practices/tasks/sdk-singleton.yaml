id: sdk-singleton-client-002
name: SDK Best Practice - Singleton Client
description: |
  Test that the skill recommends singleton CosmosClient pattern
  when reviewing code that creates a new client per request.
tags:
  - sdk
  - happy-path
  - singleton
inputs:
  prompt: |
    Review this C# code for Cosmos DB best practices:

    public class OrderService
    {
        public async Task<Order> GetOrder(string id)
        {
            var client = new CosmosClient(connectionString);
            var container = client.GetContainer("mydb", "orders");
            var response = await container.ReadItemAsync<Order>(id, new PartitionKey(id));
            return response.Resource;
        }
    }
expected:
  output_contains:
    - "singleton"
  outcomes:
    - type: task_completed
