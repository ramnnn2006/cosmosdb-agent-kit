id: model-embed-vs-reference-004
name: Data Modeling - Embed vs Reference Decision
description: |
  Test that the skill advises on embedding vs referencing for
  a one-to-many relationship with bounded child items.
tags:
  - modeling
  - happy-path
  - embed
inputs:
  prompt: |
    I have a Cosmos DB container for blog posts. Each post can have up to 20 comments.
    Comments are always displayed with the post. Should I embed comments inside the
    post document or store them in a separate container?
expected:
  output_contains:
    - "embed"
  outcomes:
    - type: task_completed
