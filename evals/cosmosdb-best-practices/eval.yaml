name: cosmosdb-best-practices-eval
description: |
  Evaluation suite for the cosmosdb-best-practices skill.
  Tests that the skill provides accurate, actionable Cosmos DB guidance
  across data modeling, partitioning, queries, SDK usage, and throughput.
skill: cosmosdb-best-practices
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: mock
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 0.6
    threshold: 0.8
    description: Did the skill complete the assigned task correctly?
  - name: cosmos_accuracy
    weight: 0.4
    threshold: 0.7
    description: Are the Cosmos DB recommendations technically accurate?
graders:
  - type: text
    name: has_output
    config:
      regex_match:
        - ".{50,}"
  - type: text
    name: cosmos_terminology
    config:
      regex_match:
        - "(?i)(cosmos|partition|RU|container|throughput|index|query)"
  - type: behavior
    name: response_constraints
    config:
      max_tool_calls: 10
      max_duration_ms: 60000
tasks:
  - "tasks/*.yaml"
