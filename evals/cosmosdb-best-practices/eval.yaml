name: cosmosdb-best-practices-eval
description: |
  Evaluation suite for the cosmosdb-best-practices skill.
  Tests that the skill provides accurate, actionable Cosmos DB guidance
  across data modeling, partitioning, queries, SDK usage, and throughput.
skill: cosmosdb-best-practices
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: mock
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.0
    description: Did the skill complete the assigned task without errors?
graders:
  - type: behavior
    name: response_constraints
    config:
      max_tool_calls: 10
      max_duration_ms: 60000
tasks:
  - "tasks/*.yaml"
